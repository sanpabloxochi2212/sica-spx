<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1D2631;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        h1 {
            font-size: 60px;
            font-weight: 800;
            letter-spacing: 8px;
            color: #2980B9;
            margin-bottom: 10px;
        }
        .sub {
            font-size: 15px;
            color: #AAAAAA;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }
        .btn {
            display: inline-block;
            background: #2980B9;
            color: white;
            text-decoration: none;
            padding: 16px 50px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
        }
        .btn:hover { background: #1ABC9C; }
    </style>
</head>
<body>
    <div>
        <h1>SICA</h1>
        <div class="sub">San Pablo Xochimehuacán</div>
        <a href="SICA.zip" class="btn">Descargar</a>
    </div>
</body>
</html>
